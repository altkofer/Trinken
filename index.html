<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Softdrinks & Energydrinks - Selbstlernkurs</title>
  <style>
    :root {
      --bg: #f4f7f7;
      --panel: #ffffff;
      --ink: #17211a;
      --muted: #5f6d64;
      --line: #d6e1e3;
      --line-strong: #aebec4;
      --primary: #0876c9;
      --primary-dark: #063f6e;
      --water: #0876c9;
      --sugar: #e5aa1d;
      --energy: #c92824;
      --cola: #3b2a23;
      --caffeine: #3d64ad;
      --ok: #168a37;
      --warn: #b66300;
      --bad: #b93636;
      --soft: #eef7fb;
      --shadow: 0 16px 36px rgba(9, 43, 63, 0.13);
      --radius: 8px;
      font-family: "Segoe UI", Arial, Helvetica, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.94) 0, rgba(244, 247, 247, 0.96) 360px),
        linear-gradient(90deg, rgba(22, 138, 55, 0.08), rgba(8, 118, 201, 0.08), rgba(201, 40, 36, 0.06)),
        var(--bg);
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    a {
      color: var(--primary-dark);
      font-weight: 700;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 292px minmax(0, 1fr);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      padding: 22px 18px;
      color: #f3fbf7;
      background:
        linear-gradient(180deg, rgba(6, 37, 58, 0.94), rgba(11, 17, 20, 0.96)),
        url("assets/can-blue.jpg") center / cover;
      border-right: 1px solid rgba(255, 255, 255, 0.12);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .brand {
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 12px;
      align-items: center;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.16);
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background:
        linear-gradient(90deg, var(--ok) 0 33%, var(--water) 33% 66%, var(--energy) 66% 100%);
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.28);
    }

    .brand h1 {
      margin: 0;
      font-size: 1.15rem;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .brand p {
      margin: 4px 0 0;
      color: rgba(243, 251, 247, 0.76);
      font-size: 0.9rem;
      line-height: 1.35;
    }

    .progress-panel {
      display: grid;
      gap: 10px;
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: rgba(243, 251, 247, 0.88);
      font-size: 0.92rem;
    }

    .progress-track {
      height: 11px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--ok), var(--water), var(--energy));
      transition: width 180ms ease;
    }

    .module-nav {
      display: grid;
      gap: 6px;
    }

    .nav-item {
      width: 100%;
      min-height: 42px;
      border: 1px solid transparent;
      border-radius: 8px;
      color: rgba(243, 251, 247, 0.82);
      background: transparent;
      text-align: left;
      padding: 8px 10px;
      display: grid;
      grid-template-columns: 24px 1fr;
      align-items: center;
      gap: 8px;
    }

    .nav-item:hover,
    .nav-item:focus-visible {
      background: rgba(255, 255, 255, 0.10);
      outline: none;
    }

    .nav-item.is-active {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.20);
    }

    .nav-index {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #12372f;
      background: rgba(255, 255, 255, 0.84);
      font-weight: 800;
      font-size: 0.78rem;
    }

    .nav-item.is-done .nav-index {
      background: #78dab4;
    }

    .nav-title {
      font-size: 0.9rem;
      line-height: 1.25;
    }

    .ghost-btn,
    .primary-btn,
    .secondary-btn,
    .icon-btn {
      border: 1px solid transparent;
      border-radius: 8px;
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 9px 14px;
      font-weight: 800;
    }

    .ghost-btn {
      color: #f3fbf7;
      background: rgba(255, 255, 255, 0.10);
      border-color: rgba(255, 255, 255, 0.14);
    }

    .ghost-btn:hover,
    .ghost-btn:focus-visible {
      background: rgba(255, 255, 255, 0.17);
      outline: none;
    }

    .primary-btn {
      color: #ffffff;
      background: var(--primary);
      border-color: var(--primary-dark);
      box-shadow: 0 10px 22px rgba(14, 115, 93, 0.22);
    }

    .primary-btn:hover,
    .primary-btn:focus-visible {
      background: var(--primary-dark);
      outline: none;
    }

    .secondary-btn {
      color: var(--primary-dark);
      background: #f5fbf8;
      border-color: #b7d6cb;
    }

    .secondary-btn:hover,
    .secondary-btn:focus-visible {
      border-color: var(--primary);
      outline: none;
    }

    .main {
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 6;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
    }

    .topbar-inner {
      max-width: 1220px;
      margin: 0 auto;
      padding: 16px 26px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
    }

    .crumb {
      margin: 0 0 4px;
      color: var(--muted);
      font-weight: 800;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .topbar h2 {
      margin: 0;
      font-size: 1.35rem;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .time-pill {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 0.9rem;
      font-weight: 800;
    }

    .screen {
      max-width: 1220px;
      width: 100%;
      margin: 0 auto;
      padding: 26px;
    }

    .module-head {
      margin-bottom: 18px;
      display: grid;
      gap: 8px;
    }

    .kicker {
      margin: 0;
      color: var(--primary-dark);
      font-weight: 900;
      font-size: 0.84rem;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .module-head h3 {
      margin: 0;
      font-size: 1.8rem;
      line-height: 1.12;
      letter-spacing: 0;
    }

    .module-head h3:focus {
      outline: none;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      max-width: 820px;
      line-height: 1.55;
      font-size: 1rem;
    }

    .screen-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(300px, 0.95fr);
      gap: 18px;
      align-items: start;
    }

    .wide-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .two-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .panel,
    .tool-panel,
    .definition-card,
    .quiz-card,
    .myth-card,
    .source-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .panel,
    .tool-panel {
      padding: 20px;
    }

    .panel h4,
    .tool-panel h4,
    .definition-card h4,
    .source-card h4 {
      margin: 0 0 10px;
      font-size: 1.08rem;
      letter-spacing: 0;
    }

    .panel h5 {
      margin: 0 0 8px;
      color: var(--primary-dark);
      font-size: 1rem;
      letter-spacing: 0;
    }

    .panel p,
    .tool-panel p,
    .definition-card p,
    .source-card p {
      color: var(--muted);
      line-height: 1.5;
    }

    .panel p:first-child,
    .tool-panel p:first-child {
      margin-top: 0;
    }

    .fact-list {
      margin: 0;
      padding-left: 20px;
      color: var(--muted);
      line-height: 1.55;
    }

    .fact-list li + li {
      margin-top: 8px;
    }

    .stat-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfdfb;
    }

    .stat strong {
      display: block;
      font-size: 1.45rem;
      color: var(--primary-dark);
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.3;
    }

    .drink-visual {
      min-height: 330px;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(7, 18, 24, 0.14), rgba(7, 18, 24, 0.70)),
        #071218;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .can-photo-grid {
      position: absolute;
      inset: 18px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .can-photo {
      min-height: 294px;
      border-radius: 8px;
      background-size: cover;
      background-position: center;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.24), 0 18px 32px rgba(0, 0, 0, 0.28);
      filter: saturate(1.04) contrast(1.02);
    }

    .can-photo.green {
      background-image:
        linear-gradient(180deg, rgba(22, 138, 55, 0.05), rgba(7, 18, 24, 0.38)),
        url("assets/can-green.jpg");
    }

    .can-photo.red {
      background-image:
        linear-gradient(180deg, rgba(201, 40, 36, 0.05), rgba(7, 18, 24, 0.38)),
        url("assets/can-red.jpg");
    }

    .can-photo.blue {
      background-image:
        linear-gradient(180deg, rgba(8, 118, 201, 0.05), rgba(7, 18, 24, 0.38)),
        url("assets/can-blue.jpg");
    }

    .visual-note {
      position: absolute;
      left: 28px;
      bottom: 28px;
      width: min(330px, calc(100% - 56px));
      padding: 12px;
      border-left: 5px solid var(--water);
      background: rgba(255, 255, 255, 0.91);
      border-radius: 8px;
      color: var(--primary-dark);
      line-height: 1.35;
      font-weight: 800;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.22);
    }

    .choice-block {
      margin: 0;
      padding: 0;
      border: 0;
      display: grid;
      gap: 9px;
    }

    .choice-block + .choice-block {
      margin-top: 16px;
    }

    legend,
    .field-label {
      color: var(--ink);
      font-weight: 900;
      line-height: 1.3;
    }

    .chip-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      padding: 7px 11px;
      background: #fff;
      color: var(--muted);
      font-weight: 800;
    }

    .chip input {
      accent-color: var(--primary);
    }

    .chip:has(input:checked) {
      color: var(--primary-dark);
      background: #e8f6ef;
      border-color: var(--primary);
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      padding: 10px 11px;
      background: #fff;
      color: var(--ink);
    }

    .field textarea {
      min-height: 112px;
      resize: vertical;
      line-height: 1.45;
    }

    .hint {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .feedback {
      border-left: 5px solid var(--primary);
      border-radius: 8px;
      background: #edf7f2;
      padding: 13px 14px;
      color: #18483d;
      line-height: 1.45;
      font-weight: 700;
    }

    .feedback:empty {
      display: none;
    }

    .feedback.warn {
      border-left-color: var(--warn);
      background: #fff4df;
      color: #684000;
    }

    .feedback.bad {
      border-left-color: var(--bad);
      background: #fff0ef;
      color: #752323;
    }

    .definition-card {
      padding: 18px;
      min-height: 214px;
      display: grid;
      align-content: start;
      gap: 10px;
    }

    .definition-card .tag {
      width: fit-content;
      border-radius: 999px;
      padding: 5px 9px;
      color: #fff;
      font-weight: 900;
      font-size: 0.8rem;
      background: var(--primary);
    }

    .definition-card.softdrink .tag {
      background: var(--cola);
    }

    .definition-card.energy .tag {
      background: var(--energy);
    }

    .definition-card.water .tag {
      background: var(--water);
    }

    .label-trainer {
      display: grid;
      grid-template-columns: minmax(260px, 0.8fr) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .label-card {
      border: 1px solid #17211a;
      border-radius: 8px;
      background: #ffffff;
      padding: 15px;
      box-shadow: 6px 6px 0 rgba(23, 33, 26, 0.10);
    }

    .label-card h4 {
      margin: 0 0 12px;
      padding-bottom: 8px;
      border-bottom: 4px solid #17211a;
      font-size: 1.18rem;
    }

    .label-photo-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .label-photo {
      min-height: 158px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.75), rgba(255,255,255,0.12)),
        #f9fbf8;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.65);
      transform: rotate(-1deg);
      display: grid;
      align-content: start;
      gap: 7px;
    }

    .label-photo:nth-child(2) {
      transform: rotate(1.2deg);
    }

    .label-photo:nth-child(3) {
      transform: rotate(-0.4deg);
    }

    .label-photo strong {
      color: var(--primary-dark);
      font-size: 0.92rem;
    }

    .label-photo span {
      border-top: 1px solid rgba(23, 33, 26, 0.18);
      padding-top: 5px;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.25;
      font-weight: 750;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid #17211a;
      font-weight: 800;
    }

    .label-row span:last-child {
      text-align: right;
    }

    .focus-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .focus-tab {
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: #fff;
      color: var(--muted);
      min-height: 38px;
      padding: 8px 11px;
      font-weight: 900;
    }

    .focus-tab.is-active {
      color: #fff;
      background: var(--primary);
      border-color: var(--primary-dark);
    }

    .formula {
      border: 1px solid #ecd17f;
      border-radius: 8px;
      background: #fff8df;
      padding: 12px;
      color: #684a05;
      font-weight: 900;
      line-height: 1.45;
    }

    .result-board {
      display: grid;
      gap: 14px;
    }

    .result-number {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .result-number div {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfdfb;
      padding: 14px;
      min-height: 88px;
    }

    .result-number strong {
      display: block;
      color: var(--primary-dark);
      font-size: 1.7rem;
      line-height: 1.05;
    }

    .result-number span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.25;
    }

    .meter {
      height: 18px;
      border-radius: 999px;
      background: #e5ece6;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .meter span {
      display: block;
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--ok), var(--sugar), var(--energy), var(--bad));
      transition: width 160ms ease;
    }

    .meter span.caff-green {
      background: var(--ok);
    }

    .meter span.caff-yellow {
      background: var(--sugar);
    }

    .meter span.caff-red {
      background: var(--bad);
    }

    .meter span.sugar-green {
      background: var(--ok);
    }

    .meter span.sugar-yellow {
      background: var(--sugar);
    }

    .meter span.sugar-red {
      background: var(--bad);
    }

    .example-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .mini-btn {
      min-height: 34px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: #fff;
      color: var(--primary-dark);
      padding: 7px 10px;
      font-weight: 900;
    }

    .mini-btn:hover,
    .mini-btn:focus-visible {
      border-color: var(--primary);
      outline: none;
    }

    .flow {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .flow-step {
      min-height: 110px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfdfb;
    }

    .flow-step strong {
      display: block;
      color: var(--primary-dark);
      margin-bottom: 6px;
    }

    .flow-step p {
      margin: 0;
      color: var(--muted);
      line-height: 1.38;
      font-size: 0.92rem;
    }

    .substance-grid,
    .study-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .info-tile {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfdfb;
      padding: 14px;
    }

    .info-tile strong {
      display: block;
      color: var(--primary-dark);
      margin-bottom: 6px;
      font-size: 1rem;
    }

    .info-tile p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .risk-list {
      display: grid;
      gap: 9px;
    }

    .risk-list .chip {
      border-radius: 8px;
      justify-content: flex-start;
    }

    .risk-question {
      align-items: flex-start;
      padding: 11px 12px;
    }

    .risk-question span {
      display: grid;
      gap: 4px;
    }

    .risk-question strong {
      color: var(--ink);
      line-height: 1.25;
    }

    .risk-question small {
      color: var(--muted);
      line-height: 1.35;
      font-weight: 650;
    }

    .myth-list,
    .quiz-list,
    .source-list {
      display: grid;
      gap: 12px;
    }

    .myth-card,
    .quiz-card,
    .source-card {
      padding: 16px;
      box-shadow: none;
    }

    .myth-card h4,
    .quiz-card h4 {
      margin: 0 0 10px;
      font-size: 1rem;
      line-height: 1.35;
    }

    .answer-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .answer-btn {
      min-height: 36px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: #fff;
      padding: 8px 10px;
      color: var(--muted);
      font-weight: 900;
    }

    .answer-btn.is-selected {
      color: #fff;
      background: var(--primary);
      border-color: var(--primary-dark);
    }

    .answer-btn.is-correct {
      color: #fff;
      background: var(--ok);
      border-color: #0d5e42;
    }

    .answer-btn.is-wrong {
      color: #fff;
      background: var(--bad);
      border-color: #822626;
    }

    .estimate-game {
      margin-top: 12px;

    .sequence-grid {

      color: var(--primary-dark);

    }

    .sequence-order {
      position: absolute;
      top: 12px;
      right: 12px;
      display: grid;

      width: 28px;
      height: 28px;
      border-radius: 999px;
      background: var(--primary);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 900;
      opacity: 0;
    }

    .sequence-card.is-picked .sequence-order {
      opacity: 1;
    }

    .sequence-actions {
      display: flex;
      gap: 9px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .option-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .option-list label {
      display: flex;
      gap: 9px;
      align-items: flex-start;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      background: #fff;
      color: var(--muted);
      font-weight: 750;
      line-height: 1.35;
    }

    .option-list input {
      margin-top: 2px;
      accent-color: var(--primary);
    }

    .option-list label:has(input:checked) {
      border-color: var(--primary);
      background: #edf7f2;
      color: var(--primary-dark);

    .score-box {

      gap: 8px;
      border-radius: 8px;
      padding: 14px;
      background: #edf7f2;
      border: 1px solid #b7d6cb;
      color: #18483d;
      font-weight: 800;
      line-height: 1.45;

    .range-row {

      gap: 8px;
      margin-top: 12px;
    }

    .range-row input[type="range"] {
      width: 100%;
      accent-color: var(--primary);
    }

    .range-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--ink);
      font-weight: 900;
    }

    .range-value {
      color: var(--primary-dark);
      white-space: nowrap;
    }

    .plan-preview {
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      padding: 18px;
      background: #ffffff;
      color: var(--ink);
    }

    .plan-preview h4 {
      margin: 0 0 8px;
      font-size: 1.22rem;
    }

    .plan-preview p {
      margin: 8px 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .plan-preview .plan-name {
      color: var(--primary-dark);
      font-weight: 900;
    }

    .check-table {
      width: 100%;
      min-width: 0;
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      border-collapse: separate;
      border-spacing: 0;
    }

    .check-table th,
    .check-table td {
      padding: 8px;
      text-align: center;
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      vertical-align: middle;
    }

    .check-table th:last-child,
    .check-table td:last-child {
      border-right: 0;
    }

    .check-table tr:last-child td {
      border-bottom: 0;
    }

    .check-table input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
    }

    .check-table input[type="number"] {
      width: 64px;
      min-height: 34px;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      padding: 6px;
      text-align: center;
    }

    .print-note {
      margin-top: 12px;
      border-left: 5px solid var(--water);
      background: #edf7fb;
      border-radius: 8px;
      padding: 10px 12px;
      color: #16495a;
      font-weight: 800;
      line-height: 1.35;
    }

    .source-card summary {
      cursor: pointer;
      font-weight: 900;
      color: var(--primary-dark);
    }

    .source-card p {
      margin-bottom: 0;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 680px;
    }

    th,
    td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      line-height: 1.42;
    }

    th {
      background: #edf6f1;
      color: var(--primary-dark);
      font-size: 0.9rem;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .bottom-controls {
      position: sticky;
      bottom: 0;
      z-index: 5;
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.91);
      backdrop-filter: blur(10px);
    }

    .bottom-inner {
      max-width: 1220px;
      margin: 0 auto;
      padding: 13px 26px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .bottom-inner .progress-mini {
      color: var(--muted);
      font-weight: 800;
      line-height: 1.3;
    }

    .control-row {
      display: flex;
      gap: 9px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 1020px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        height: auto;
        border-right: 0;
        padding: 16px;
      }

      .module-nav {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .screen-grid,
      .label-trainer {
        grid-template-columns: 1fr;
      }

      .wide-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px) {
      html,
      body {
        overflow-x: hidden;
      }

      .app,
      .main,
      .screen,
      .bottom-controls,
      .bottom-inner {
        max-width: 100%;
      }

      .screen,
      .topbar-inner,
      .bottom-inner {
        padding-left: 15px;
        padding-right: 15px;
      }

      .topbar {
        display: none;
      }

      .topbar-inner,
      .bottom-inner {
        align-items: stretch;
        flex-direction: column;
      }

      .time-pill {
        width: fit-content;
      }

      .module-nav,
      .wide-grid,
      .two-grid,
      .field-grid,
      .stat-row,
      .result-number,
      .sequence-grid,
      .flow {
        grid-template-columns: 1fr;
      }

      .module-head h3 {
        font-size: 1.45rem;
      }

      .drink-visual {
        min-height: 300px;
      }

      .sidebar {
        position: sticky;
        top: 0;
        z-index: 8;
        width: 100%;
        overflow-x: hidden;
        padding: 12px 14px;
        gap: 10px;
        max-height: 46vh;
      }

      .brand {
        grid-template-columns: 36px 1fr;
        gap: 10px;
        padding-bottom: 10px;
      }

      .brand-mark {
        width: 36px;
        height: 36px;
      }

      .brand h1 {
        font-size: 1rem;
      }

      .brand p {
        display: none;
      }

      .progress-panel {
        gap: 6px;
      }

      .module-nav {
        display: flex;
        width: 100%;
        max-width: 100%;
        overflow-x: auto;
        padding-bottom: 3px;
        scrollbar-width: thin;
      }

      .nav-item {
        flex: 0 0 134px;
        min-height: 38px;
        grid-template-columns: 22px 1fr;
        padding: 7px 9px;
      }

      .nav-index {
        width: 22px;
        height: 22px;
      }

      .nav-title {
        font-size: 0.84rem;
      }

      .sidebar > .ghost-btn {
        display: none;
      }

      .visual-note {
        width: auto;
        left: 18px;
        right: 18px;
        top: 18px;
        bottom: auto;
      }

      .can-photo-grid {
        inset: 12px;
        gap: 8px;
      }

      .can-photo {
        min-height: 276px;
      }

      .label-photo-grid,
      .substance-grid,
      .study-grid {
        grid-template-columns: 1fr;
      }

      .range-head {
        flex-direction: column;
        gap: 4px;
      }

      .plan-preview,
      .check-table {
        max-width: 100%;
      }

      .check-table {
        table-layout: fixed;
        font-size: 0.78rem;
      }

      .check-table th,
      .check-table td {
        padding: 6px 4px;
        overflow-wrap: anywhere;
      }

      .check-table input[type="number"] {
        width: 42px;
        min-height: 32px;
      }

      .control-row {
        justify-content: stretch;
      }

      .primary-btn,
      .secondary-btn {
        flex: 1 1 150px;
      }
    }

    @media print {
      body {
        background: #fff;
      }

      .sidebar,
      .topbar,
      .bottom-controls,
      .module-head,
      .tool-panel {
        display: none !important;
      }

      .app,
      .main,
      .screen,
      .screen-grid {
        display: block;
        min-height: auto;
        padding: 0;
        margin: 0;
      }

      .screen {
        max-width: none;
      }

      .panel {
        border: 0;
        box-shadow: none;
        padding: 0;
      }

      #printArea,
      .plan-preview {
        display: block;
        border: 0;
        box-shadow: none;
        padding: 0;
      }

      .check-table th,
      .check-table td {
        border-color: #333;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="Kursnavigation">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div>
          <h1>Softdrinks & Energydrinks</h1>
          <p>Selbstlernkurs für ca. 30 Minuten</p>
        </div>
      </div>

      <div class="progress-panel" aria-label="Fortschritt">
        <div class="progress-row">
          <span>Fortschritt</span>
          <strong id="progressText">0 %</strong>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <nav class="module-nav" id="moduleNav" aria-label="Module"></nav>

      <button class="ghost-btn" id="resetBtn" type="button" title="Kurs zurücksetzen">
        <span aria-hidden="true">↺</span>
        <span>Zurücksetzen</span>
      </button>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-inner">
          <div>
            <p class="crumb" id="moduleCrumb">Modul 0 von 11</p>
            <h2 id="topTitle">Was trinkst du eigentlich?</h2>
          </div>
          <div class="time-pill" id="timePill">2 min</div>
        </div>
      </header>

      <section class="screen" id="screen" aria-live="polite"></section>

      <footer class="bottom-controls">
        <div class="bottom-inner">
          <div class="progress-mini" id="progressMini">Start</div>
          <div class="control-row">
            <button class="secondary-btn" id="prevBtn" type="button">
              <span aria-hidden="true">‹</span>
              <span>Zurück</span>
            </button>
            <button class="primary-btn" id="nextBtn" type="button">
              <span>Weiter</span>
              <span aria-hidden="true">›</span>
            </button>
          </div>
        </div>
      </footer>
    </main>
  </div>

  <script>
    const caffeineExamples = {
      energy250: { label: "Energy 250 ml", ml: 250, mg100: 32, amount: 1 },
      energy500: { label: "Energy 500 ml", ml: 500, mg100: 32, amount: 1 },
      cola330: { label: "Cola 330 ml", ml: 330, mg100: 10.6, amount: 1 },
      coffee200: { label: "Filterkaffee 200 ml", ml: 200, mg100: 45, amount: 1 },
      custom: { label: "Eigene Werte", ml: 250, mg100: 32, amount: 1 }
    };

    const labelFocus = {
      amount: {
        title: "Getränkemenge",
        text: "Die Menge steht oft vorne auf Dose oder Flasche. Für die Rechnung zählt die gesamte Menge, die du wirklich trinkst - nicht nur eine kleine Portion."
      },
      sugar: {
        title: "Zucker pro 100 ml",
        text: "Die Nährwerttabelle nennt Zucker meistens pro 100 ml. Daraus rechnest du die echte Menge: ml × g Zucker pro 100 ml / 100."
      },
      caffeine: {
        title: "Koffein pro 100 ml",
        text: "Bei Energydrinks steht häufig 32 mg/100 ml. Eine 250-ml-Dose enthält dann etwa 80 mg Koffein, eine 500-ml-Dose etwa 160 mg."
      },
      sources: {
        title: "Alle Quellen zählen",
        text: "Koffein kommt nicht nur aus Energy: Kaffee, Cola, schwarzer und grüner Tee, Schokolade und Pre-Workout-Produkte zählen mit."
      }
    };

    const myths = [
      {
        text: "Taurin macht die eigentliche Power im Energydrink.",
        correct: "false",
        feedback: "Nicht sauber belegt. Der wachmachende Effekt kommt vor allem vom Koffein."
      },
      {
        text: "Zero-Getränke sind automatisch gesund.",
        correct: "false",
        feedback: "Sie sparen Zucker und Kalorien. Als täglicher Standard bleibt Wasser die bessere Wahl."
      },
      {
        text: "Kaffee und Energydrink sind dasselbe Problem.",
        correct: "depends",
        feedback: "Kommt darauf an: Beide liefern Koffein. Energydrinks werden aber oft süß, kalt, schnell und in großen Dosen getrunken."
      },
      {
        text: "Ich brauche Energy zum Lernen.",
        correct: "depends",
        feedback: "Koffein kann kurz wach machen. Lernen und Konzentration hängen aber stark von Schlaf ab."
      },
      {
        text: "Unter dem Richtwert heißt: empfohlen.",
        correct: "false",
        feedback: "Nein. Der Richtwert ist kein Ziel. Besser ist: so wenig wie nötig, nicht so viel wie erlaubt."
      }
    ];

    const riskHints = {
      alcohol: "Energy plus Alkohol kann dazu führen, dass Müdigkeit und Alkoholeffekte schlechter eingeschätzt werden. Das erhöht die Gefahr für riskante Entscheidungen.",
      sport: "Bei intensiver körperlicher Belastung zählen Flüssigkeit, Essen und Pausen mehr als ein Koffein-Kick. Große Mengen Koffein plus Belastung sind ungünstig.",
      late: "Koffein am Nachmittag oder Abend kann Einschlafen und Schlafqualität verschlechtern. Das kann den nächsten müden Tag mitverursachen.",
      meds: "Bei Medikamenten, Drogen, Pre-Workout oder anderen Nahrungsergänzungsmitteln können Wirkungen zusammenkommen. Hier ist besondere Vorsicht sinnvoll.",
      heart: "Bei Herz-Kreislauf-Beschwerden, Bluthochdruck oder starker Koffeinempfindlichkeit ist medizinischer Rat wichtig."
    };

    const sourceDocs = [
      {
        title: "EFSA: Sicherheit von Koffein",
        file: "Quellen_Energydrinks_Softdrinks/00_EFSA_Scientific%20Opinion%20on%20the%20safety%20of%20caffeine.pdf",
        summary: "Grundlage für die Koffein-Einordnung: Für Kinder und Jugendliche wird 3 mg Koffein pro kg Körpergewicht und Tag als Orientierungswert genutzt. Erwachsene Richtwerte werden ebenfalls eingeordnet."
      },
      {
        title: "RKI: Energydrink-Konsum bei 12- bis 17-Jährigen",
        file: "Quellen_Energydrinks_Softdrinks/01_RKI_EsKiMoII_Energydrink_Konsum_2020.pdf",
        summary: "Zeigt, wie häufig Jugendliche Energydrinks konsumieren. Wichtig: Ein Teil der Konsumierenden überschreitet allein durch Energydrinks den Koffein-Orientierungswert."
      },
      {
        title: "BfR: Energy Drinks und Herz-Kreislauf-Risiko",
        file: "Quellen_Energydrinks_Softdrinks/02_BfR_Energy_Drinks_Gesundheitsrisiko_Herz_Kreislauf_2019.pdf",
        summary: "Bewertet mögliche akute Herz-Kreislauf-Effekte. Besonders relevant sind große Mengen, Konsum in kurzer Zeit, Alkohol, Sport und individuelle Empfindlichkeit."
      },
      {
        title: "BfR FAQ: Koffein und Energy Drinks",
        file: "Quellen_Energydrinks_Softdrinks/03_BfR_FAQ_Caffeine_Foods_Energy_Drinks_2015.pdf",
        summary: "Erklärt, was Koffein ist, wie es anregend wirkt und welche unerwünschten Wirkungen bei hoher Aufnahme auftreten können: Nervosität, Schlaflosigkeit, Schwitzen und Herzrasen."
      },
      {
        title: "BfR: EDKAR-Studie zu Jugendlichen",
        file: "Quellen_Energydrinks_Softdrinks/04_BfR_FAQ_EDKAR_Studie_Energy_Drink_Jugendliche_2025.pdf",
        summary: "Ordnet chronisch hohen Energydrink-Konsum bei Jugendlichen ein. Die Studie verhindert einfache Schwarz-Weiß-Aussagen und zeigt zugleich berichtete Beschwerden bei Vielkonsum."
      },
      {
        title: "RKI KiGGS: Zuckerhaltige Getränke",
        file: "Quellen_Energydrinks_Softdrinks/05_RKI_KiGGS_Zuckerhaltige_Getraenke_2018.pdf",
        summary: "Zeigt Zusammenhänge zwischen zuckerhaltigen Getränken, Gewichtsentwicklung, Diabetesrisiko und Zahngesundheit bei Kindern und Jugendlichen."
      },
      {
        title: "DGE/DAG/DDG: Empfehlung zur Zuckerzufuhr",
        file: "Quellen_Energydrinks_Softdrinks/06_DGE_DAG_DDG_Konsensuspapier_Zuckerzufuhr_2018.pdf",
        summary: "Begründet die Empfehlung, freie Zucker zu begrenzen. Für die App wichtig: Flüssiger Zucker sättigt wenig und kann schnell hohe Tagesmengen erzeugen."
      },
      {
        title: "DGE: Wasser trinken - fit bleiben",
        file: "Quellen_Energydrinks_Softdrinks/07_DGE_Wasser_trinken_fit_bleiben_2024.pdf",
        summary: "Erklärt, warum Wasser der beste Durstlöscher ist: Der Körper braucht regelmäßig Flüssigkeit, Konzentration und Leistungsfähigkeit leiden bei Flüssigkeitsmangel."
      },
      {
        title: "WIdO-monitor: Gesundheit von Auszubildenden",
        file: "Quellen_Energydrinks_Softdrinks/08_WIdOmonitor_Gesundheit_Auszubildende_2019.pdf",
        summary: "Stellt die Lebenswelt von Auszubildenden dar: Müdigkeit, Schlafdauer, Süßigkeiten, Softdrinks und Gesundheitsverhalten sind direkt anschlussfähig an die Zielgruppe."
      }
    ];

    const state = {
      active: 0,
      labelFocus: "amount",
      myths: {},
      risks: [],
      cycleOrder: []
    };

    const modules = [
      { id: "start", label: "Start", minutes: "2 min", title: "Was trinkst du eigentlich - und was macht es mit dir?", render: renderStart },
      { id: "basics", label: "Was ist was?", minutes: "3 min", title: "Softdrink, Energydrink, Wasser", render: renderBasics },
      { id: "label", label: "Etikett", minutes: "3 min", title: "Dein Getränk im Check", render: renderLabel, bind: bindLabel },
      { id: "sugar", label: "Zucker", minutes: "5 min", title: "Der Zucker-Check", render: renderSugar, bind: bindSugar },
      { id: "caffeine", label: "Koffein: Menge", minutes: "5 min", title: "Koffeinmenge einschätzen", render: renderCaffeine, bind: bindCaffeine },
      { id: "caffeine-effects", label: "Koffein: Wirkung", minutes: "5 min", title: "Wirkung und Risiken einordnen", render: renderCaffeineEffects, bind: bindCaffeineEffects },
      { id: "additives", label: "Zusatzstoffe (Taurin, Säuren,...)", minutes: "4 min", title: "Taurin, Süßstoffe und andere Stoffe", render: renderAdditives },
      { id: "myths", label: "Mythen", minutes: "3 min", title: "Mythencheck", render: renderMyths, bind: bindMyths },
      { id: "plan", label: "10-Tage-Plan", minutes: "3 min", title: "Dein konkreter Vorsatz", render: renderPlan, bind: bindPlan },
      { id: "sources", label: "Quellen", minutes: "1 min", title: "Faktenbasis und saubere Formulierungen", render: renderSources }
    ];

    const screen = document.getElementById("screen");
    const moduleNav = document.getElementById("moduleNav");
    const progressFill = document.getElementById("progressFill");
    const progressText = document.getElementById("progressText");
    const moduleCrumb = document.getElementById("moduleCrumb");
    const topTitle = document.getElementById("topTitle");
    const timePill = document.getElementById("timePill");
    const progressMini = document.getElementById("progressMini");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const resetBtn = document.getElementById("resetBtn");

    function render(options = { focus: true }) {
      const module = modules[state.active];
      screen.innerHTML = module.render();
      topTitle.textContent = module.title;
      moduleCrumb.textContent = `Modul ${state.active} von ${modules.length - 1}`;
      timePill.textContent = module.minutes;
      progressMini.textContent = `${module.label} · ${state.active + 1}/${modules.length}`;

      const pct = Math.round((state.active / (modules.length - 1)) * 100);
      progressFill.style.width = `${pct}%`;
      progressText.textContent = `${pct} %`;

      prevBtn.disabled = state.active === 0;
      nextBtn.innerHTML = state.active === modules.length - 1
        ? '<span>Zum Start</span><span aria-hidden="true">↺</span>'
        : '<span>Weiter</span><span aria-hidden="true">›</span>';

      renderNav();
      if (module.bind) module.bind();
      if (options.focus) {
        const heading = screen.querySelector("[tabindex='-1']");
        if (heading) heading.focus({ preventScroll: true });
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    }

    function renderNav() {
      moduleNav.innerHTML = modules.map((module, index) => `
        <button class="nav-item ${index === state.active ? "is-active" : ""} ${index < state.active ? "is-done" : ""}" type="button" data-nav="${index}">
          <span class="nav-index">${index}</span>
          <span class="nav-title">${escapeHtml(module.label)}</span>
        </button>
      `).join("");
      moduleNav.querySelectorAll("[data-nav]").forEach(btn => {
        btn.addEventListener("click", () => {
          state.active = Number(btn.dataset.nav);
          render();
        });

        <section class="panel" style="margin-top:14px;">

          <p>Suche nicht nur nach „Zucker“ und „Koffein“. Schau auch auf Begriffe wie Süßungsmittel, Säuerungsmittel, Aromen, Taurin, Guarana, Inosit und Glucuronolacton. Die Quellen zeigen dabei keinen Grund für Panik, aber einen klaren Grund für genaue Mengen: Entscheidend bleibt, wie oft, wie viel und zu welcher Uhrzeit du das trinkst.</p>
        </section>
      `;
    }

    function renderMyths() {
      return `
        ${moduleHead("Modul 7 · Mythencheck", "Stimmt das wirklich?", "Entscheide mit Zahlen und sauberer Einordnung, nicht mit Werbung oder Bauchgefühl.")}
        <section class="panel" style="margin-bottom:14px;">
          <h4>Quellenblick</h4>
          <p>Die Quellen sprechen vorsichtig: Sie zeigen typische Mengen, Richtwerte und Risiken, aber keine Schockbotschaften. Gute Entscheidungen entstehen deshalb aus konkreten Fragen: Wie viel? Wie oft? Zu welcher Uhrzeit? In welcher Kombination?</p>
        </section>
        <div class="myth-list">
          ${myths.map((myth, index) => {
            const selected = state.myths[index];
            return `
              <article class="myth-card">
                <h4>${index + 1}. ${myth.text}</h4>
                <div class="answer-row" role="group" aria-label="Antworten zu Mythos ${index + 1}">
                  ${mythButton(index, "true", "Stimmt", selected, myth.correct)}
                  ${mythButton(index, "false", "Stimmt nicht", selected, myth.correct)}
                  ${mythButton(index, "depends", "Kommt darauf an", selected, myth.correct)}
                </div>
                ${selected ? `<p class="hint"><strong>${selected === myth.correct ? "Richtig." : "Noch einmal prüfen."}</strong> ${myth.feedback}</p>` : ""}
              </article>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderPlan() {
      return `
        ${moduleHead("Modul 8 · Transfer", "Dein 10-Tage-Plan", "Ein guter Vorsatz ist konkret, realistisch und überprüfbar. Die Zahlen gelten für alle 10 Tage zusammen, nicht pro Tag.")}
        <div class="screen-grid">
          <section class="tool-panel">
            <h4>Plan einstellen</h4>
            <p class="hint">Die Ziele beziehen sich immer auf die Summe der nächsten 10 Tage. Im Kontrollplan trägst du jeden Abend die tatsächliche Anzahl ein und rechnest am Ende zusammen.</p>
            <label class="field">
              <span class="field-label">Name</span>
              <input id="studentName" type="text" value="" placeholder="Dein Name">
            </label>
            <div class="range-row">
              <div class="range-head"><span>Wie viele Energydrinks nehme ich in den nächsten 10 Tagen insgesamt maximal zu mir?</span><span class="range-value" id="energyGoalValue">2</span></div>
              <input id="energyGoal" type="range" min="0" max="10" step="1" value="2">
            </div>
            <div class="range-row">
              <div class="range-head"><span>Wie viele Softdrinks nehme ich in den nächsten 10 Tagen insgesamt maximal zu mir?</span><span class="range-value" id="softGoalValue">5</span></div>
              <input id="softGoal" type="range" min="0" max="20" step="1" value="5">
            </div>
            <div class="range-row">
              <div class="range-head"><span>An wie vielen von 10 Tagen trinke ich ausschließlich Wasser?</span><span class="range-value" id="waterGoalValue">3/10</span></div>
              <input id="waterGoal" type="range" min="0" max="10" step="1" value="3">
            </div>
            <div class="field-grid" style="margin-top:12px;">
              <label class="field">
                <span class="field-label">Wenn ...</span>
                <input id="ifTrigger" type="text" value="ich morgens müde bin">
              </label>
              <label class="field">
                <span class="field-label">Dann ...</span>
                <input id="thenAction" type="text" value="trinke ich zuerst Wasser und esse etwas">
              </label>
            </div>
            <label class="field" style="margin-top:12px;">
              <span class="field-label">Was könnte schwierig werden?</span>
              <textarea id="ownNote">Schwierigkeit: Müdigkeit, Geschmack, Freunde, Verfügbarkeit oder Stress. Meine Lösung: Ich entscheide vorher, nicht erst im Moment.</textarea>
            </label>
            <div class="example-row">
              <button class="primary-btn" type="button" id="makePlan"><span>Plan aktualisieren</span><span aria-hidden="true">›</span></button>
              <button class="secondary-btn" type="button" id="printPlan"><span aria-hidden="true">⎙</span><span>Drucken</span></button>
              <button class="secondary-btn" type="button" id="copyPlan"><span aria-hidden="true">□</span><span>Kopieren</span></button>
            </div>
            <p class="hint" id="copyStatus" aria-live="polite"></p>
          </section>
          <section class="panel" id="printArea">
            <div id="planPreview" class="plan-preview"></div>
          </section>
        </div>
      `;
    }

    function renderSources() {
      return `
        ${moduleHead("Modul 9 · Quellen", "Quellen und PDF-Dateien", "Hier findest du alle neun hinterlegten Quellen. Jeder Button öffnet die PDF-Datei aus dem Quellenordner in einem neuen Tab.")}
        <div class="source-list">
          ${sourceDocs.map((source, index) => `
            <article class="source-card">
              <h4>${index + 1}. ${source.title}</h4>
              <p>${source.summary}</p>
              <a class="primary-btn" href="${source.file}" target="_blank" rel="noopener">
                <span>PDF öffnen</span>
                <span aria-hidden="true">›</span>
              </a>
            </article>
          `).join("")}
        </div>
      `;
    }

    function radioGroup(name, title, options, selected) {
      return `
        <fieldset class="choice-block">
          <legend>${title}</legend>
          <div class="chip-grid">
            ${options.map(([value, label]) => `
              <label class="chip"><input type="radio" name="${name}" value="${value}" ${selected === value ? "checked" : ""}>${label}</label>
            `).join("")}
          </div>
        </fieldset>
      `;
    }

    function checkGroup(name, title, options, selected) {
      return `
        <fieldset class="choice-block">
          <legend>${title}</legend>
          <div class="chip-grid">
            ${options.map(([value, label]) => `
              <label class="chip"><input type="checkbox" name="${name}" value="${value}" ${selected.includes(value) ? "checked" : ""}>${label}</label>
            `).join("")}
          </div>
        </fieldset>
      `;
    }

    function bindLabel() {
      document.querySelectorAll("[data-focus]").forEach(btn => {
        btn.addEventListener("click", () => {
          state.labelFocus = btn.dataset.focus;
          render({ focus: false });
        });
      });
    }

    function bindSugar() {
      const inputs = ["sugarMl", "sugarPer100"].map(id => document.getElementById(id));
      inputs.forEach(input => input.addEventListener("input", updateSugar));
      document.querySelectorAll("[data-sugar-example]").forEach(btn => {
        btn.addEventListener("click", () => {
          const [ml, sugar] = btn.dataset.sugarExample.split(",");
          document.getElementById("sugarMl").value = ml;
          document.getElementById("sugarPer100").value = sugar;
          updateSugar();
        });
      });
      bindSugarGuess();
      updateSugar();
    }

    function bindCaffeine() {
      const ids = ["bodyWeight", "caffMl", "caffMg100", "caffAmount", "coffeeExtra", "colaExtra", "teaExtra"];
      ids.map(id => document.getElementById(id)).forEach(input => input.addEventListener("input", updateCaffeine));
      document.getElementById("caffPreset").addEventListener("change", event => {
        const item = caffeineExamples[event.target.value];
        document.getElementById("caffMl").value = item.ml;
        document.getElementById("caffMg100").value = item.mg100;
        document.getElementById("caffAmount").value = item.amount;
        updateCaffeine();
      });
      bindCaffeineGuess();
      updateCaffeine();
    }

    function bindCaffeineEffects() {
      bindCycleGame();
      bindRisks();
    }

    function bindSugarGuess() {
      bindEstimateButtons(
        "[data-sugar-guess]",
        "50",
        "sugarGuessFeedback",
        "Richtig: 500 ml Cola enthalten bei ungefähr 10 g Zucker pro 100 ml etwa 50 g Zucker.",
        "Noch nicht. Rechne 5 × 10 g: Eine 500-ml-Flasche Cola liegt ungefähr bei 50 g Zucker."
      );
    }

    function bindCaffeineGuess() {
      bindEstimateButtons(
        "[data-caffeine-guess]",
        "80",
        "caffeineGuessFeedback",
        "Richtig: 250 ml Energydrink enthalten bei 32 mg Koffein pro 100 ml ungefähr 80 mg Koffein.",
        "Noch nicht. 250 ml sind 2,5 × 100 ml. 2,5 × 32 mg sind ungefähr 80 mg Koffein."
      );
    }

    function bindEstimateButtons(selector, correctValue, feedbackId, correctText, retryText) {
      document.querySelectorAll(selector).forEach(btn => {
        btn.addEventListener("click", () => {
          const guess = btn.dataset.sugarGuess || btn.dataset.caffeineGuess;
          document.querySelectorAll(selector).forEach(item => {
            item.classList.remove("is-selected", "is-correct", "is-wrong");
          });
          btn.classList.add("is-selected");
          const feedback = document.getElementById(feedbackId);
          if (guess === correctValue) {
            btn.classList.add("is-correct");
            feedback.className = "feedback";
            feedback.textContent = correctText;
          } else {
            btn.classList.add("is-wrong");
            feedback.className = "feedback warn";
            feedback.textContent = retryText;
          }
        });
      });
    }

    function bindCycleGame() {
      document.querySelectorAll("[data-cycle]").forEach(btn => {
        btn.addEventListener("click", () => {
          const key = btn.dataset.cycle;
          const position = state.cycleOrder.indexOf(key);
          if (position >= 0) {
            state.cycleOrder.splice(position, 1);
          } else if (state.cycleOrder.length < 4) {
            state.cycleOrder.push(key);
          }
          updateCycleGame();
        });
      });
      document.getElementById("resetCycle").addEventListener("click", () => {
        state.cycleOrder = [];
        updateCycleGame();
      });
      document.getElementById("checkCycle").addEventListener("click", () => {
        const correct = ["tired", "energy", "awake", "tiredAgain"];
        const feedback = document.getElementById("cycleFeedback");
        if (state.cycleOrder.length < correct.length) {
          feedback.className = "feedback warn";
          feedback.textContent = "Wähle alle vier Schritte aus.";
          updateCycleGame();
          return;
        }
        const solved = correct.every((key, index) => state.cycleOrder[index] === key);
        feedback.className = solved ? "feedback" : "feedback warn";
        feedback.textContent = solved
          ? "Richtig: Müdigkeit ist der Startpunkt. Energy kann kurz helfen, später den Schlaf stören und am nächsten Tag wieder Müdigkeit verstärken."
          : "Fast. Überlege: Erst kommt die Müdigkeit, dann der Griff zum Energy, danach kann man später wach liegen und am nächsten Tag wieder müde sein.";
        updateCycleGame();
      });
      updateCycleGame();
    }

    function updateCycleGame() {
      document.querySelectorAll("[data-cycle]").forEach(btn => {
        const order = state.cycleOrder.indexOf(btn.dataset.cycle) + 1;
        btn.classList.toggle("is-picked", order > 0);
        btn.setAttribute("aria-pressed", order > 0 ? "true" : "false");
        btn.querySelector(".sequence-order").textContent = order || "";
      });
    }

    function bindRisks() {
      document.querySelectorAll("input[name='risk']").forEach(input => {
        input.addEventListener("change", () => {
          state.risks = Array.from(document.querySelectorAll("input[name='risk']:checked")).map(item => item.value);
          document.getElementById("riskFeedback").innerHTML = riskFeedback();
          document.getElementById("riskFeedback").className = state.risks.length ? "feedback warn" : "feedback";
        });
      });
      document.getElementById("riskFeedback").className = state.risks.length ? "feedback warn" : "feedback";
    }

    function bindMyths() {
      document.querySelectorAll("[data-myth]").forEach(btn => {
        btn.addEventListener("click", () => {
          state.myths[btn.dataset.myth] = btn.dataset.answer;
          render({ focus: false });
        });
      });
    }

    function bindPlan() {
      ["studentName", "energyGoal", "softGoal", "waterGoal", "ifTrigger", "thenAction", "ownNote"].forEach(id => {
        document.getElementById(id).addEventListener("input", makePlan);
      });
      document.getElementById("makePlan").addEventListener("click", makePlan);
      document.getElementById("printPlan").addEventListener("click", () => window.print());
      document.getElementById("copyPlan").addEventListener("click", copyPlan);
      makePlan();
    }

    function updateSugar() {
      const ml = numberValue("sugarMl");
      const per100 = numberValue("sugarPer100");
      const grams = ml * per100 / 100;
      document.getElementById("sugarGrams").textContent = `${formatNumber(grams)} g`;
      const sugarMeter = document.getElementById("sugarMeter");
      sugarMeter.style.width = `${Math.min(100, grams / 50 * 100)}%`;
      sugarMeter.className = grams >= 50 ? "sugar-red" : grams >= 25 ? "sugar-yellow" : "sugar-green";
      const feedback = document.getElementById("sugarFeedback");
      if (grams === 0) {
        feedback.className = "feedback";
        feedback.textContent = "Zuckerfrei spart Zucker und Kalorien. Als Standard bleibt Wasser trotzdem die bessere Basis, weil Zero-Getränke häufig Säuren, Süßstoffe, Aromen und den süßen Gewohnheitsreiz behalten. Wasser löscht Durst ohne Zusatzstoffe und ohne Koffein.";
      } else if (grams < 25) {
        feedback.className = "feedback";
        feedback.textContent = "Unter 25 g: Die Menge ist niedriger, zählt aber trotzdem zum Tageszucker.";
      } else if (grams < 50) {
        feedback.className = "feedback warn";
        feedback.textContent = "Ab etwa 25 g: Das ist schon eine spürbare Zuckermenge in einem Getränk.";
      } else {
        feedback.className = "feedback bad";
        feedback.textContent = "Ab etwa 50 g: Das ist sehr viel freier Zucker auf einmal. Etikett und Gewohnheit lohnen den Blick.";
      }
    }

    function updateCaffeine() {
      const weight = Math.max(1, numberValue("bodyWeight"));
      const ml = numberValue("caffMl");
      const mg100 = numberValue("caffMg100");
      const amount = numberValue("caffAmount");
      const coffee = numberValue("coffeeExtra") * 90;
      const cola = numberValue("colaExtra") * 35;
      const tea = numberValue("teaExtra") * 50;
      const total = (ml * mg100 / 100 * amount) + coffee + cola + tea;
      const limit = weight * 3;
      const pct = total / limit * 100;
      document.getElementById("caffTotal").textContent = `${formatNumber(total)} mg`;
      document.getElementById("caffLimit").textContent = `${formatNumber(limit)} mg`;
      document.getElementById("caffPercent").textContent = `${formatNumber(pct)} % des 3-mg/kg-Orientierungswertes`;
      const caffMeter = document.getElementById("caffMeter");
      caffMeter.style.width = `${Math.min(100, pct)}%`;
      caffMeter.className = pct > 100 ? "caff-red" : pct >= 90 ? "caff-yellow" : "caff-green";
      const feedback = document.getElementById("caffFeedback");
      if (pct < 50) {
        feedback.className = "feedback";
        feedback.textContent = "Die berechnete Menge liegt deutlich unter dem Orientierungswert. Trotzdem gilt: Der Wert ist kein Ziel.";
      } else if (pct < 90) {
        feedback.className = "feedback warn";
        feedback.textContent = "Du näherst dich dem Orientierungswert. Weitere Koffeinquellen am selben Tag zählen mit.";
      } else if (pct <= 100) {
        feedback.className = "feedback warn";
        feedback.textContent = "Du liegst sehr nah am Orientierungswert. Später Konsum und weitere Quellen sind jetzt besonders relevant.";
      } else {
        feedback.className = "feedback bad";
        feedback.textContent = "Die berechnete Menge liegt über dem Orientierungswert. Das ist ein klares Signal, Menge oder Zeitpunkt zu ändern.";
      }
    }

    function riskFeedback() {
      if (!state.risks.length) {
        return "Keine Risikokombi ausgewählt. Die Grundregel bleibt: Menge, Tageszeit und weitere Koffeinquellen im Blick behalten.";
      }
      return state.risks.map(key => `<p style="margin:0 0 8px;">${riskHints[key]}</p>`).join("");
    }

    function mythButton(index, value, label, selected, correct) {
      let cls = "answer-btn";
      if (selected === value) cls += " is-selected";
      if (selected && value === correct) cls += " is-correct";
      if (selected === value && selected !== correct) cls += " is-wrong";
      return `<button class="${cls}" type="button" data-myth="${index}" data-answer="${value}">${label}</button>`;
    }

    function makePlan() {
      const name = document.getElementById("studentName").value.trim() || "________________";
      const energyGoal = numberValue("energyGoal");
      const softGoal = numberValue("softGoal");
      const waterGoal = numberValue("waterGoal");
      const ifTrigger = document.getElementById("ifTrigger").value.trim() || "ich müde bin";
      const thenAction = document.getElementById("thenAction").value.trim() || "trinke ich zuerst Wasser";
      const own = document.getElementById("ownNote").value.trim();
      document.getElementById("energyGoalValue").textContent = energyGoal;
      document.getElementById("softGoalValue").textContent = softGoal;
      document.getElementById("waterGoalValue").textContent = `${waterGoal}/10`;
      const rows = Array.from({ length: 10 }, (_, index) => `
        <tr>
          <td>Tag ${index + 1}</td>
          <td><input type="number" min="0" step="1" aria-label="Tag ${index + 1}: Anzahl Energydrinks"></td>
          <td><input type="number" min="0" step="1" aria-label="Tag ${index + 1}: Anzahl Softdrinks"></td>
          <td><input type="checkbox" aria-label="Tag ${index + 1}: Wasser-Tag erreicht"></td>
          <td></td>
        </tr>
      `).join("");
      document.getElementById("planPreview").innerHTML = `
        <h4>10-Tage-Trinkplan</h4>
        <p class="plan-name">Name: ${escapeHtml(name)}</p>
        <p>Ich trinke in den nächsten 10 Tagen insgesamt maximal <strong>${energyGoal}</strong> Energydrink${energyGoal === 1 ? "" : "s"}.</p>
        <p>Ich trinke in den nächsten 10 Tagen insgesamt maximal <strong>${softGoal}</strong> Softdrink${softGoal === 1 ? "" : "s"}.</p>
        <p>Ich trinke an mindestens <strong>${waterGoal} von 10 Tagen</strong> ausschließlich Wasser.</p>
        <p><strong>Wenn</strong> ${escapeHtml(ifTrigger)}, <strong>dann</strong> ${escapeHtml(thenAction)}.</p>
        <p>${escapeHtml(own)}</p>
        <table class="check-table">
          <thead>
            <tr><th>Tag</th><th>Anzahl Energydrinks</th><th>Anzahl Softdrinks</th><th>Nur Wasser?</th><th>Notiz</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
        <div class="print-note">Jeden Abend kurz eintragen: Wie viele Energydrinks und Softdrinks waren es heute? Am Ende werden alle 10 Tage zusammengerechnet und mit deinem Ziel verglichen.</div>
      `;
    }

    function buildPlanText() {
      const name = document.getElementById("studentName").value.trim() || "________________";
      const energyGoal = numberValue("energyGoal");
      const softGoal = numberValue("softGoal");
      const waterGoal = numberValue("waterGoal");
      const ifTrigger = document.getElementById("ifTrigger").value.trim() || "ich müde bin";
      const thenAction = document.getElementById("thenAction").value.trim() || "trinke ich zuerst Wasser";
      const own = document.getElementById("ownNote").value.trim();
      const text = [
        "Mein 10-Tage-Plan",
        `Name: ${name}`,
        "",
        `Ich trinke in den nächsten 10 Tagen insgesamt maximal ${energyGoal} Energydrink${energyGoal === 1 ? "" : "s"}.`,
        `Ich trinke in den nächsten 10 Tagen insgesamt maximal ${softGoal} Softdrink${softGoal === 1 ? "" : "s"}.`,
        `Ich trinke an mindestens ${waterGoal} von 10 Tagen ausschließlich Wasser.`,
        `Wenn ${ifTrigger}, dann ${thenAction}.`,
        own ? `Schwierigkeit/Lösung: ${own}` : "",
        "",
        "Kontrolle:",
        ...Array.from({ length: 10 }, (_, index) => `Tag ${index + 1}: Energydrinks Anzahl: ___ Softdrinks Anzahl: ___ Nur Wasser: [ ] Notiz: __________`),
        "",
        "Nach 10 Tagen prüfe ich: Was hat funktioniert? Was war schwer? Was ändere ich realistisch?"
      ].filter(Boolean).join("\n");
      return text;
    }

    async function copyPlan() {
      const status = document.getElementById("copyStatus");
      const text = buildPlanText();
      try {
        await navigator.clipboard.writeText(text);
        status.textContent = "Plan wurde in die Zwischenablage kopiert.";
      } catch (error) {
        status.textContent = "Kopieren ist im Browser blockiert. Drucken funktioniert trotzdem.";
      }
    }

    function numberValue(id) {
      const value = Number(String(document.getElementById(id).value).replace(",", "."));
      return Number.isFinite(value) ? value : 0;
    }

    function formatNumber(value) {
      if (!Number.isFinite(value)) return "0";
      return new Intl.NumberFormat("de-DE", { maximumFractionDigits: value < 10 ? 1 : 0 }).format(value);
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    prevBtn.addEventListener("click", () => {
      if (state.active > 0) {
        state.active -= 1;
        render();
      }
    });

    nextBtn.addEventListener("click", () => {
      state.active = state.active === modules.length - 1 ? 0 : state.active + 1;
      render();
    });

    resetBtn.addEventListener("click", () => {
      if (!confirm("Kurs wirklich zurücksetzen?")) return;
      state.active = 0;
      state.labelFocus = "amount";
      state.myths = {};
      state.risks = [];
      state.cycleOrder = [];
      render();
    });

    render();
  </script>
</body>
</html>
